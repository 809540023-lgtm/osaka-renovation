<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>圖示產生器 - 林博御裝修</title>
<style>
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#1a1a2e;margin:0;font-family:sans-serif;color:#fff}
h1{margin-bottom:30px}
.icon-container{display:flex;gap:40px;flex-wrap:wrap;justify-content:center}
.icon-box{text-align:center}
.icon{width:192px;height:192px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:40px;display:flex;align-items:center;justify-content:center;margin-bottom:15px;box-shadow:0 10px30px rgba(102,126,234,0.4)}
.icon-large{width:512px;height:512px;border-radius:100px}
.emoji{font-size:100px}
.icon-large .emoji{font-size:280px}
p{margin:10px 0;color:#aaa}
.download{margin-top:30px;text-align:center}
.download a{display:inline-block;padding:15px 30px;background:#667eea;color:#fff;text-decoration:none;border-radius:25px;font-weight:bold;margin:10px}
.download a:hover{background:#764ba2}
</style>
</head>
<body>
<h1>🏠 林博御裝修系統 - App 圖示</h1>
<div class="icon-container">
<div class="icon-box">
<div class="icon">🏠</div>
<p>192 x 192</p>
</div>
<div class="icon-box">
<div class="icon icon-large">🏠</div>
<p>512 x 512</p>
</div>
</div>
<div class="download">
<p>您有兩個選擇：</p>
<a href="#" onclick="alert('請用以下方法製作圖示：\n\n1. 用手機截圖這個頁面\n2. 或用電腦瀏覽器打開\n3. 截圖後用crop.xdmp.io裁剪\n\n或直接用Canva制作')">📱 如何取得圖示</a>
</div>
</body>
</html>
