<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>忘記密碼 - 林博御裝修系統</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Noto Sans TC",sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{max-width:450px;width:100%}
.box{background:#fff;border-radius:20px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.logo{text-align:center;margin-bottom:30px}
.logo-icon{font-size:3em;margin-bottom:10px}
.logo-text{font-size:1.5em;font-weight:bold;color:#1a1a2e}
.logo-subtitle{color:#666;margin-top:5px}
.alert{padding:15px;border-radius:10px;margin-bottom:20px;display:none}
.alert-error{background:#fee;color:#c00}
.alert-success{background:#efe;color:#060}
.form-group{margin-bottom:20px}
.form-label{display:block;margin-bottom:8px;color:#333;font-weight:500}
.form-input{width:100%;padding:15px;border:2px solid #e0e0e0;border-radius:10px;font-size:1em}
.form-input:focus{outline:none;border-color:#667eea}
.btn{width:100%;padding:15px;border:none;border-radius:10px;font-size:1.1em;font-weight:bold;cursor:pointer;transition:all 0.3s}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-primary:hover{transform:translateY(-2px)}
.links{text-align:center;margin-top:20px;color:#666}
.links a{color:#667eea;text-decoration:none}
</style>
</head>
<body>
<div class="container">
<div class="box">
<div class="logo">
<div class="logo-icon">🔐</div>
<div class="logo-text">林博御裝修系統</div>
<div class="logo-subtitle">重設密碼</div>
</div>
<div id="alert" class="alert"></div>
<form id="forgotForm">
<div class="form-group">
<label class="form-label">註冊的 Email</label>
<input type="email" class="form-input" id="email" placeholder="請輸入註冊的 Email" required>
</div>
<button type="submit" class="btn btn-primary">發送重設連結</button>
</form>
<div class="links">
想起密碼了？<a href="login.html">登入</a>
</div>
</div>
<div style="text-align:center;margin-top:20px;color:#fff;opacity:0.7">
<a href="index.html" style="color:#fff">回首頁</a>
</div>
</div>
<script>
document.getElementById('forgotForm').addEventListener('submit',function(e){
e.preventDefault();
const email=document.getElementById('email').value;
const alert=document.getElementById('alert');
alert.textContent='密碼重設功能即將開放，請聯繫管理員！';
alert.className='alert alert-success';
alert.style.display='block';
});
</script>
</body>
</html>
