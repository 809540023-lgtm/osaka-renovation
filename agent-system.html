<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 助手系統 - 林博御裝修</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#667eea;--secondary:#764ba2;--bg:#f5f5f5;--dark:#333;--light:#fff}
body{font-family:"Noto Sans TC",sans-serif;background:var(--bg);min-height:100vh}
.header{background:linear-gradient(135deg,var(--primary),var(--secondary));color:var(--light);padding:20px;text-align:center}
.header h1{font-size:1.8em;margin-bottom:5px}
.header p{opacity:0.9;font-size:0.9em}
.container{max-width:1200px;margin:0 auto;padding:20px}
.agent-select{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;margin-bottom:30px}
.agent-card{background:var(--light);border-radius:15px;padding:20px;text-align:center;cursor:pointer;transition:all 0.3s;border:3px solid transparent;box-shadow:0 5px15px rgba(0,0,0,0.1)}
.agent-card:hover{transform:translateY(-5px)}
.agent-card.active{border-color:var(--primary);background:rgba(102,126,234,0.1)}
.agent-icon{font-size:2.5em;margin-bottom:10px}
.agent-name{font-weight:bold;font-size:1.1em;color:var(--dark)}
.agent-desc{font-size:0.85em;color:#666;margin-top:5px}
.chat-box{background:var(--light);border-radius:20px;box-shadow:0 10px30px rgba(0,0,0,0.1);overflow:hidden}
.chat-header{background:linear-gradient(135deg,var(--primary),var(--secondary));color:var(--light);padding:20px;display:flex;align-items:center;gap:15px}
.chat-icon{font-size:2em}
.chat-info h2{font-size:1.2em}
.chat-info p{font-size:0.85em;opacity:0.9}
.chat-messages{padding:20px;min-height:400px;max-height:500px;overflow-y:auto}
.message{display:flex;margin-bottom:15px}
.message.user{flex-direction:row-reverse}
.message-bubble{max-width:70%;padding:12px 18px;border-radius:18px;font-size:0.95em;line-height:1.5}
.message.user .message-bubble{background:linear-gradient(135deg,var(--primary),var(--secondary));color:var(--light);border-bottom-right-radius:5px}
.message.bot .message-bubble{background:#e9ecef;color:var(--dark);border-bottom-left-radius:5px}
.chat-input{display:flex;gap:10px;padding:20px;border-top:1px solid #eee}
.chat-input input{flex:1;padding:15px;border:2px solid #e0e0e0;border-radius:25px;font-size:1em;outline:none}
.chat-input input:focus{border-color:var(--primary)}
.chat-input button{padding:15px 30px;background:linear-gradient(135deg,var(--primary),var(--secondary));color:var(--light);border:none;border-radius:25px;font-weight:bold;cursor:pointer}
.chat-input button:hover{transform:scale(1.05)}
.back-link{display:inline-block;margin-bottom:20px;color:var(--primary);text-decoration:none}
.back-link:hover{text-decoration:underline}
.quick-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:15px}
.quick-btn{padding:8px 15px;background:#e9ecef;border:none;border-radius:15px;font-size:0.85em;cursor:pointer;transition:all 0.3s}
.quick-btn:hover{background:var(--primary);color:var(--light)}
@media(max-width:600px){
.agent-select{grid-template-columns:repeat(2,1fr)}
.chat-messages{min-height:300px}
}
</style>
</head>
<body>
<div class="header">
<h1>🤖 AI 助手系統</h1>
<p>選擇一個 Agent 為您服務</p>
</div>
<div class="container">
<a href="index.html" class="back-link">← 返回首頁</a>
<!-- Agent 選擇 -->
<div class="agent-select">
<div class="agent-card active" onclick="selectAgent('estimation')">
<div class="agent-icon">📊</div>
<div class="agent-name">Agent #1</div>
<div class="agent-desc">估價詢問</div>
</div>
<div class="agent-card" onclick="selectAgent('material')">
<div class="agent-icon">🛒</div>
<div class="agent-name">Agent #2</div>
<div class="agent-desc">材料採購</div>
</div>
<div class="agent-card" onclick="selectAgent('diy')">
<div class="agent-icon">🔧</div>
<div class="agent-name">Agent #3</div>
<div class="agent-desc">DIY詢問</div>
</div>
<div class="agent-card" onclick="selectAgent('acceptance')">
<div class="agent-icon">📋</div>
<div class="agent-name">Agent #4</div>
<div class="agent-desc">驗收流程</div>
</div>
<div class="agent-card" onclick="selectAgent('subsidy')">
<div class="agent-icon">💰</div>
<div class="agent-name">Agent #5</div>
<div class="agent-desc">補助申請</div>
</div>
</div>
<!-- 對話框 -->
<div class="chat-box">
<div class="chat-header">
<div class="chat-icon" id="currentIcon">📊</div>
<div class="chat-info">
<h2 id="currentName">估價詢問 Agent</h2>
<p id="currentDesc">專業估價分析，為您解答工程費用問題</p>
</div>
</div>
<div class="chat-messages" id="messages">
<div class="message bot">
<div class="message-bubble">您好！我是估價詢問 Agent。<br><br>我可以幫您：<br>• 估價單分析<br>• 市場行情查詢<br>• 議價建議<br>• 費用估算<br><br>請問有什麼需要幫您？</div>
</div>
</div>
<div class="chat-input">
<input type="text" id="userInput" placeholder="輸入您的問題..." onkeypress="if(event.key==='Enter')sendMessage()">
<button onclick="sendMessage()">發送</button>
</div>
</div>
</div>
<script>
const agents={
estimation:{name:'估價詢問 Agent',icon:'📊',desc:'專業估價分析，為您解答工程費用問題',welcome:'您好！我是估價詢問 Agent。<br><br>我可以幫您：<br>• 估價單分析<br>• 市場行情查詢<br>• 議價建議<br>• 費用估算<br><br>請問有什麼需要幫您？',quick:['分析估價單','市場行情','議價建議']},
material:{name:'材料採購 Agent',icon:'🛒',desc:'推薦優質建材供應商',welcome:'您好！我是材料採購 Agent。<br><br>我可以幫您：<br>• 建材推薦<br>• 供應商資訊<br>• 價格比較<br>• 購買建議<br><br>請問需要什麼材料？',quick:['地板推薦','衛浴設備','油漆材料']},
diy:{name:'DIY詢問 Agent',icon:'🔧',desc:'DIY施工技巧與指導',welcome:'您好！我是DIY詢問 Agent。<br><br>我可以幫您：<br>• DIY技巧教學<br>• 工具推薦<br>• 施工注意事項<br>• 安全性建議<br><br>請問想做什麼DIY？',quick:['油漆教學','簡單木工','貼紙技巧']},
acceptance:{name:'驗收流程 Agent',icon:'📋',desc:'專業驗收流程諮詢',welcome:'您好！我是驗收流程 Agent。<br><br>我可以幫您：<br>• 驗收標準說明<br>• 驗收項目確認<br>• 問題紀錄<br>• 驗收報告<br><br>請問需要什麼協助？',quick:['驗收標準','驗收項目','常見問題']},
subsidy:{name:'補助申請 Agent',icon:'💰',desc:'日本住宅補助申請顧問',welcome:'您好！我是補助申請 Agent。<br><br>我可以幫您：<br>• 補助制度搜尋<br>• 資格評估<br>• 申請流程<br>• 準備文件清單<br><br>請問想申請什麼補助？',quick:['大阪市補助','節能改修','耐震補助']}
};
let currentAgent='estimation';
function selectAgent(agent){
currentAgent=agent;
document.querySelectorAll('.agent-card').forEach(c=>c.classList.remove('active'));
document.querySelectorAll('.agent-card')[Object.keys(agents).indexOf(agent)].classList.add('active');
document.getElementById('currentIcon').textContent=agents[agent].icon;
document.getElementById('currentName').textContent=agents[agent].name;
document.getElementById('currentDesc').textContent=agents[agent].desc;
document.getElementById('messages').innerHTML='<div class="message bot"><div class="message-bubble">'+agents[agent].welcome+'</div></div>';
updateQuickActions(agent);
}
function updateQuickActions(agent){
const quickBtns=agents[agent].quick.map(q=>`<button class="quick-btn" onclick="sendQuick('${q}')">${q}</button>`).join('');
document.querySelector('.chat-messages').insertAdjacentHTML('afterbegin','<div class="quick-actions">'+quickBtns+'</div>');
}
function sendQuick(text){
document.getElementById('userInput').value=text;
sendMessage();
}
function sendMessage(){
const input=document.getElementById('userInput');
const text=input.value.trim();
if(!text)return;
addMessage(text,'user');
input.value='';
setTimeout(()=>{
const response=getResponse(text);
addMessage(response,'bot');
},500);
}
function addMessage(text,sender){
const div=document.createElement('div');
div.className='message '+sender;
div.innerHTML='<div class="message-bubble">'+text+'</div>';
document.getElementById('messages').appendChild(div);
document.getElementById('messages').scrollTop=document.getElementById('messages').scrollHeight;
}
function getResponse(text){
const agentData=agents[currentAgent];
const t=text.toLowerCase();
if(currentAgent==='estimation'){
if(t.includes('估價')||t.includes('分析'))return'好的，請提供您的估價單，我可以為您：<br>1. 逐項分析價格合理性<br>2. 對比市場行情<br>3. 建議議價空間<br><br>請問您的工程項目是？';
if(t.includes('市場')||t.includes('行情'))return'2024-2025年大阪裝修市場行情：<br>• 浴室翻新：¥60萬起<br>• 廚房更新：¥40萬起<br>• 全室裝修：¥150萬起<br>• 節能改修：¥30萬起';
if(t.includes('議價')||t.includes('便宜'))return'議價建議：<br>• 搬入搬出：可議價約¥20,000-25,000<br>• 垃圾處理：可議價約¥30,000-40,000<br>• 交通費：可議價約¥30,000-40,000<br>• 總共可省約¥145,000';
}
if(currentAgent==='material'){
if(t.includes('地板')||t.includes('床'))return'推薦地板材質：<br>• 實木地板：¥8,000-15,000/坪<br>• 耐磨地板：¥3,000-6,000/坪<br>• PVC地板：¥2,000-4,000/坪<br><br>歡迎到大阪日系賣場實際看看！';
if(t.includes('衛浴')||t.includes('浴室'))return'推薦衛浴品牌：<br>• TOTO：最具知名度<br>• Panasonic：性價比高<br>•INAX：設計感佳<br><br>系統浴室一套約¥30-60萬';
if(t.includes('油漆')||t.includes('塗裝'))return'推薦油漆：<br>• 水性漆：環保無味<br>• 硅藻土：除濕除臭<br>• 功能漆：防霉抗菌<br><br>一般壁面¥2,000-5,000/坪';
}
if(currentAgent==='diy'){
if(t.includes('油漆')||t.includes('刷'))return'油漆DIY步驟：<br>1. 清潔牆面<br>2. 貼保護膠帶<br>3. 塗底漆<br>4. 上面漆（兩遍）<br><br>記得保持通風！';
if(t.includes('木工')||t.includes('木'))return'簡單木工DIY：<br>• 只需要基本的螺絲起子、鋸子<br>• 從簡單的置物架開始<br>• 使用拼接板較容易成功<br><br>安全第一，記得戴護目鏡！';
if(t.includes('貼')||t.includes('壁'))return'壁紙DIY技巧：<br>1. 確認牆面平整<br>2. 從門口開始貼<br>3. 用刮板刮平氣泡<br>4. 多餘部分用美工刀切除<br><br>新手建議從小面積開始練習！';
}
if(currentAgent==='acceptance'){
if(t.includes('標準')||t.includes('項目'))return'驗收5階段：<br>1. 拆除驗收<br>2. 水電驗收<br>3. 泥作驗收<br>4. 表面驗收<br>5. 完工驗收<br><br>每階段都需要業主確認簽名！';
if(t.includes('問題')||t.includes('異常')return'常見驗收問題：<br>• 防水測試未做<br>• 排水不順<br>• 油漆刷痕<br>• 磁磚空心<br><br>發現問題要立即紀錄要求改善！';
if(t.includes('報告')||t.includes('文件')return'驗收報告包含：<br>• 工程項目對照表<br>• 驗收照片<br>• 問題紀錄<br>• 雙方簽名<br><br>建議保留一年保固期記錄！';
}
if(currentAgent==='subsidy'){
if(t.includes('大阪')||t.includes('市'))return'大阪市主要補助：<br>• 空家利活用：最多¥100萬<br>• 省エネ改修：最多¥30萬<br>• 耐震診断：最多¥5萬<br><br>每年12月中旬截止申請！';
if(t.includes('節能')||t.includes('省'))return'節能改修補助條件：<br>• 須為住宅用途<br>• 工事內容符合節能標準<br>• 完工後須接受實地檢查<br><br>建議先諮詢再申請！';
if(t.includes('耐震')||t.includes('震'))return'耐震補助：<br>• 診断費用：最多¥5萬<br>• 設計費用：最多¥10萬<br>• 改修工事：最多¥100萬<br><br>1981年前建造的房屋優先！';
}
return'謝謝您的問題！請更具體描述您的需求，我會進一步為您解答。<br><br>或者點擊上方的快速按鈕獲得常用資訊。';
}
selectAgent('estimation');
</script>
</body>
</html>
